name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Cancel outdated runs when new commits are pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Fast feedback - runs first, blocks tests if quality fails
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        # Install the optional extras ([all]) alongside [dev] so that the
        # optional-dependency modules (redis, mongodb, drf, jwt, prometheus,
        # opentelemetry, ...) are importable and therefore actually type
        # checked by mypy. With only [dev] those modules are skipped.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"

      - name: Run pre-commit hooks
        run: pre-commit run --all-files

      - name: Run mypy type checking
        run: mypy django_smart_ratelimit

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        # Install the package with all extras so pip-audit scans the real
        # dependency tree (including optional backends) rather than a bare env.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all]"
          # Pin bandit: its B105 heuristics shift between minor releases, so an
          # unpinned bandit makes a green build non-reproducible.
          pip install pip-audit "bandit==1.9.4"

      - name: Run pip-audit (dependency vulnerability scan)
        # Advisory, not blocking. This is a LIBRARY: it does not pin its dev /
        # test / transitive tooling (black, cryptography, Django, ...), and the
        # installed environment will always carry some advisories that are not
        # this package's runtime risk and that downstream users control by
        # choosing their own versions. So pip-audit surfaces findings for
        # awareness without failing the PR. The allowlist below still lets you
        # silence specific reviewed advisories. For a hard gate, run pip-audit
        # on a schedule against the resolved runtime deps instead.
        continue-on-error: true
        run: |
          ARGS=()
          while IFS= read -r line || [ -n "$line" ]; do
            id="$(printf '%s' "$line" | sed -e 's/^[[:space:]]*//' -e 's/[[:space:]]*$//')"
            case "$id" in
              ''|\#*) continue ;;
            esac
            ARGS+=(--ignore-vuln "$id")
          done < .github/pip-audit-allowlist.txt
          pip-audit --strict "${ARGS[@]}"

      - name: Run bandit security check
        run: bandit -r django_smart_ratelimit/

  # Main test matrix - with coverage on one job
  test:
    runs-on: ubuntu-latest
    needs: quality  # Don't waste resources if quality fails
    strategy:
      fail-fast: false  # See all failures, not just first
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]
        django-version: ["3.2", "4.2", "5.0", "5.1"]  # Removed EOL 4.0, 4.1
        exclude:
          # Django 3.2 doesn't support Python 3.11+
          - python-version: "3.11"
            django-version: "3.2"
          - python-version: "3.12"
            django-version: "3.2"
          - python-version: "3.13"
            django-version: "3.2"
          # Django 5.0+ requires Python 3.10+
          - python-version: "3.9"
            django-version: "5.0"
          - python-version: "3.9"
            django-version: "5.1"
        include:
          # Add coverage flag to one specific combination
          - python-version: "3.12"
            django-version: "5.1"
            coverage: true

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ratelimit_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        # Pin Django in the SAME resolver pass as the package so the extras
        # (notably djangorestframework, whose newest release requires Django
        # >=4.2) cannot silently upgrade Django away from the matrix version.
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]" "Django==${{ matrix.django-version }}" psycopg2-binary

      - name: Run tests
        if: ${{ !matrix.coverage }}
        run: pytest -m "not benchmark"
        env:
          REDIS_URL: redis://localhost:6379/0
          MONGODB_URL: mongodb://localhost:27017/test

      - name: Run tests with coverage
        # The coverage cell runs the suite against PostgreSQL (via DATABASE_URL)
        # so the DB concurrency/atomicity tests -- which SQLite cannot reproduce
        # -- actually execute. Other cells run on SQLite.
        if: ${{ matrix.coverage }}
        run: pytest -m "not benchmark" --cov=django_smart_ratelimit --cov-report=xml --cov-report=term-missing --cov-fail-under=65
        env:
          REDIS_URL: redis://localhost:6379/0
          MONGODB_URL: mongodb://localhost:27017/test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ratelimit_test

      - name: Upload coverage to Codecov
        if: ${{ matrix.coverage }}
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  build:
    runs-on: ubuntu-latest
    needs: quality  # Build only if quality passes
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Check package
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/
